services:

  mongo:
    image: mongo:7
    container_name: candidate_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: candidate_backend
    restart: always
    ports:
      - "3002:3002"
    environment:
      - MONGO_URI=mongodb://mongo:27017/candidate-app
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: candidate_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
